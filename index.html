<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POV 戦闘機フライトシミュレーター</title>
  <style>
    :root { --cyan: #29f0e0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #04060a; }
    body { font-family: "Courier New", monospace; color: var(--cyan); }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }
    #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
    #overlay {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, rgba(4,20,24,.85), rgba(2,4,8,.97));
      z-index: 20; text-align: center; cursor: pointer;
    }
    #overlay .panel {
      border: 1px solid var(--cyan); padding: 34px 46px; max-width: 560px;
      box-shadow: 0 0 24px rgba(41,240,224,.25); background: rgba(2,10,14,.6);
    }
    #overlay h1 { font-size: 26px; letter-spacing: 4px; margin-bottom: 6px; text-shadow: 0 0 10px var(--cyan); }
    #overlay .sub { font-size: 12px; opacity: .7; letter-spacing: 2px; margin-bottom: 20px; }
    #overlay table { margin: 0 auto 20px; font-size: 13px; text-align: left; border-collapse: collapse; }
    #overlay td { padding: 2px 10px; }
    #overlay td.key { color: #fff; text-align: right; opacity: .9; }
    #overlay .start { font-size: 15px; letter-spacing: 3px; color: #fff; animation: blink 1.1s steps(2) infinite; }
    @keyframes blink { 50% { opacity: .25; } }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="app"></div>
  <canvas id="hud"></canvas>
  <div id="overlay">
    <div class="panel">
      <h1>POV JET SIMULATOR</h1>
      <div class="sub">WIREFRAME COMBAT FLIGHT</div>
      <table>
        <tr><td class="key">W / S ・ ↑ / ↓</td><td>ピッチ (機首上下)</td></tr>
        <tr><td class="key">A / D ・ ← / →</td><td>ロール (左右傾き)</td></tr>
        <tr><td class="key">Q / E</td><td>ヨー (機首左右)</td></tr>
        <tr><td class="key">Shift / Ctrl</td><td>スロットル 増 / 減</td></tr>
        <tr><td class="key">Space ・ クリック</td><td>機銃 発射</td></tr>
        <tr><td class="key">マウス</td><td>機首エイム (微調整)</td></tr>
        <tr><td class="key">C</td><td>視点切替 (コックピット / HUD)</td></tr>
        <tr><td class="key">R</td><td>リスポーン</td></tr>
      </table>
      <div class="start">▶ クリックして開始</div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
